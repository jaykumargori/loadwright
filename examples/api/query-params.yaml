name: httpbin-query-params
target: https://httpbin.org
load:
  users: 3
  ramp_up: 5s
  loops: 2
requests:
  - name: search with query params
    method: GET
    path: /get
    query:
      q: load testing
      page: "1"
    expect:
      status: 200
thresholds:
  error_rate_lt: 1
  p95_ms_lt: 3000
