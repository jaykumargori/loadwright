name: form-urlencoded-example
target: https://httpbin.org
load:
  users: 2
  ramp_up: 5s
  loops: 2
requests:
  - name: submit form
    method: POST
    path: /post
    body_form:
      username: demo
      password: secret
    expect:
      status: 200
thresholds:
  error_rate_lt: 1
  p95_ms_lt: 3000
