name: Feature Request
description: Suggest a practical improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior, command, or spec shape.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds or alternative designs did you consider?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - YAML spec
        - JMX generation
        - Docker/JMeter runtime
        - Reports
        - Imports
        - Documentation
        - Other
